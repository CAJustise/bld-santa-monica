<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BLD Santa Monica | BOH Admin</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="boh-page">
  <main class="boh-shell">
    <div class="boh-topbar">
      <h1>BLD BOH Admin</h1>
      <a href="index.html" class="boh-back-link">Back to Site</a>
    </div>
    <p class="boh-intro">Manage promotions, menu items, merch, location details, and social links here.</p>

    <div class="boh-grid">
      <section class="boh-card">
        <h3>Promo Banner</h3>
        <form id="promo-form" class="boh-form">
          <label><input type="checkbox" id="promo-active"> Active promo</label>
          <label for="promo-text">Promo text</label>
          <input id="promo-text" type="text" placeholder="Happy Hour 3-5 PM Daily">
          <label for="promo-cta-label">CTA label</label>
          <input id="promo-cta-label" type="text" placeholder="Learn More">
          <label for="promo-cta-url">CTA URL</label>
          <input id="promo-cta-url" type="url" placeholder="https://...">
          <button type="submit">Save Promo</button>
        </form>
      </section>

      <section class="boh-card">
        <h3>Add Menu Item</h3>
        <form id="menu-form" class="boh-form">
          <label for="menu-name">Name</label>
          <input id="menu-name" type="text" required>
          <label for="menu-price">Price (number)</label>
          <input id="menu-price" class="price-input" type="number" min="0" max="999.99" step="0.01" required>
          <label for="menu-image">Image URL/path</label>
          <input id="menu-image" type="text" placeholder="images/breakfast.jpg">
          <label for="menu-image-file">Or upload image from device</label>
          <input id="menu-image-file" type="file" accept="image/*">
          <button type="button" id="menu-image-upload-btn">Upload Menu Image to GitHub</button>
          <button type="submit">Add Menu Item</button>
        </form>
        <div id="menu-admin-list" class="boh-list"></div>
      </section>

      <section class="boh-card">
        <h3>Add Merch Item</h3>
        <form id="merch-form" class="boh-form">
          <label for="merch-name">Name</label>
          <input id="merch-name" type="text" required>
          <label for="merch-price">Price (number)</label>
          <input id="merch-price" class="price-input" type="number" min="0" max="999.99" step="0.01" required>
          <label for="merch-image">Image URL/path</label>
          <input id="merch-image" type="text" placeholder="images/bldlogo.png">
          <label for="merch-image-file">Or upload image from device</label>
          <input id="merch-image-file" type="file" accept="image/*">
          <button type="button" id="merch-image-upload-btn">Upload Merch Image to GitHub</button>
          <button type="submit">Add Merch Item</button>
        </form>
        <div id="merch-admin-list" class="boh-list"></div>
      </section>

      <section class="boh-card">
        <h3>Location Details</h3>
        <form id="location-form" class="boh-form">
          <label for="location-address">Address</label>
          <input id="location-address" type="text" required>
          <label for="location-map-url">Google Maps URL</label>
          <input id="location-map-url" type="url" required>
          <label for="location-phone">Phone</label>
          <input id="location-phone" type="text" required>
          <label for="location-email">Email</label>
          <input id="location-email" type="email" required>
          <label for="hours-breakfast-input">Breakfast hours</label>
          <input id="hours-breakfast-input" type="text" required>
          <label for="hours-lunch-input">Lunch hours</label>
          <input id="hours-lunch-input" type="text" required>
          <label for="hours-dinner-input">Dinner hours</label>
          <input id="hours-dinner-input" type="text" required>
          <label for="hours-open-days-input">Open days</label>
          <input id="hours-open-days-input" type="text" required>
          <button type="submit">Save Location</button>
        </form>
      </section>

      <section class="boh-card boh-card-wide">
        <h3>Social Links</h3>
        <form id="social-form" class="boh-form boh-inline-form">
          <input id="social-label" type="text" placeholder="Instagram" required>
          <select id="social-icon" required>
            <option value="instagram">Instagram</option>
            <option value="facebook">Facebook</option>
            <option value="tiktok">TikTok</option>
            <option value="x">X</option>
            <option value="youtube">YouTube</option>
            <option value="linkedin">LinkedIn</option>
            <option value="link">Link</option>
          </select>
          <input id="social-url" type="url" placeholder="https://..." required>
          <button type="submit">Add Social Link</button>
        </form>
        <div id="social-admin-list" class="boh-list"></div>
      </section>

      <section class="boh-card boh-card-wide">
        <h3>Sync Across Devices (GitHub)</h3>
        <form id="sync-form" class="boh-form">
          <label for="sync-owner">GitHub owner</label>
          <input id="sync-owner" type="text" value="CAJustise" required>
          <label for="sync-repo">GitHub repo</label>
          <input id="sync-repo" type="text" value="bld-santa-monica" required>
          <label for="sync-branch">Branch</label>
          <input id="sync-branch" type="text" value="main" required>
          <label for="sync-path">Data file path</label>
          <input id="sync-path" type="text" value="site-data.json" required>
          <label for="sync-token">GitHub token (repo scope, saved on this device once)</label>
          <input id="sync-token" type="password" placeholder="ghp_...">
          <button type="submit">Save Sync Settings (Optional)</button>
        </form>
        <div class="sync-actions">
          <button type="button" id="sync-pull-btn">Load From GitHub</button>
          <button type="button" id="sync-push-btn">Save To GitHub (All Devices)</button>
        </div>
      </section>
    </div>
    <p id="boh-status" class="boh-status" aria-live="polite"></p>
  </main>

  <script src="script.js"></script>
</body>
</html>
